# ============================================
# SupplyChain AI Platform - Shared Application Config
# ============================================

spring:
  application:
    name: supplychainai
  cloud:
    discovery:
      enabled: true
      client:
        service-url:
          defaultZone: http://service-registry:8761/eureka/
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
          auto-create-topics: true
  zipkin:
    base-url: http://zipkin:9411
    enabled: true
  micrometer:
    tracing:
      propagation:
        type: b3
      export:
        zipkin:
          enabled: true

# Eureka client for all services
eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
    registry-fetch-interval-seconds: 10
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 30

# Actuator for all services
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

# Resilience4j defaults
resilience4j:
  circuitbreaker:
    instances:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      default:
        timeoutDuration: 10s

# Logging
logging:
  level:
    com.supplychainai: INFO
    org.springframework.cloud: INFO
    org.springframework.kafka: WARN
    org.springframework.ai: DEBUG
    dev.langchain4j: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Kafka common config
kafka:
  topics:
    partitions: 3
    replication-factor: 1

# JWT common config
jwt:
  secret: ${JWT_SECRET:SupplyChainAI_JWT_Min32CharSecret_2024}
  access-token-expiration: 900000  # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

# AI/LLM Configuration (LangChain4j + Ollama)
spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3.1}
        options:
          temperature: 0.7
          top-p: 0.9
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
        options:
          temperature: 0.0

# LangChain4j Configuration
langchain4j:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    chat-model: ${OLLAMA_CHAT_MODEL:llama3.1}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    timeout: 60s
    max-retries: 3
  rag:
    enabled: true
    retriever:
      max-results: 5
      min-score: 0.7
    content-retriever:
      max-tokens: 4000
    query-transformer:
      enabled: true

# PGVector Configuration
pgvector:
  database: ${PGVECTOR_DATABASE:supplychainai}
  username: ${PGVECTOR_USERNAME:postgres}
  password: ${PGVECTOR_PASSWORD:SupplyChain@2024}
  host: postgres
  port: 5432
  vector-dimension: 768
  index-type: HNSW
  distance-type: COSINE_DISTANCE

# MCP (Model Context Protocol) Configuration
mcp:
  client:
    enabled: true
    servers:
      filesystem:
        enabled: ${MCP_SERVER_FILESYSTEM_ENABLED:true}
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/workspace"]
      git:
        enabled: ${MCP_SERVER_GIT_ENABLED:true}
        command: npx
        args: ["-y", "@modelcontextprotocol/server-git", "--repository", "/workspace"]
      postgres:
        enabled: ${MCP_SERVER_POSTGRES_ENABLED:true}
        command: npx
        args: ["-y", "@modelcontextprotocol/server-postgres", "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"]
      kafka:
        enabled: ${MCP_SERVER_KAFKA_ENABLED:true}
        command: npx
        args: ["-y", "@modelcontextprotocol/server-kafka", "${KAFKA_BOOTSTRAP_SERVERS}"]

# Admin Service Configuration
admin:
  ai:
    enabled: true
    rag-integration: true
    mcp-integration: true
  monitoring:
    services-health-check-interval: 30s
    metrics-retention-days: 30
  automation:
    enabled: true
    scheduled-tasks:
      - name: "daily-rag-index-rebuild"
        cron: "0 2 * * *"
      - name: "weekly-model-evaluation"
        cron: "0 3 * * 0"