<div class="po-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title class="page-header">
        <span class="header-title">Purchase Orders</span>
        <button mat-raised-button color="primary">
          <mat-icon>add</mat-icon>
          Create PO
        </button>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="filter-bar">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Search by PO or supplier">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="status-filter">
          <mat-label>Status</mat-label>
          <mat-select (selectionChange)="applyStatusFilter($event.value)">
            <mat-option value="">All</mat-option>
            <mat-option *ngFor="let status of statuses" [value]="status">{{ status }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort class="po-table">
          <ng-container matColumnDef="poNumber">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>PO Number</th>
            <td mat-cell *matCellDef="let po">{{ po.poNumber }}</td>
          </ng-container>

          <ng-container matColumnDef="supplier">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Supplier</th>
            <td mat-cell *matCellDef="let po">{{ po.supplier }}</td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
            <td mat-cell *matCellDef="let po">
              <mat-chip-set>
                <mat-chip [class]="getStatusClass(po.status)" [disableRipple]="true">
                  {{ po.status }}
                </mat-chip>
              </mat-chip-set>
            </td>
          </ng-container>

          <ng-container matColumnDef="totalAmount">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Total Amount</th>
            <td mat-cell *matCellDef="let po" class="amount-cell">{{ formatCurrency(po.totalAmount) }}</td>
          </ng-container>

          <ng-container matColumnDef="orderDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Order Date</th>
            <td mat-cell *matCellDef="let po">{{ po.orderDate }}</td>
          </ng-container>

          <ng-container matColumnDef="deliveryDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Delivery Date</th>
            <td mat-cell *matCellDef="let po">{{ po.deliveryDate }}</td>
          </ng-container>

          <ng-container matColumnDef="items">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Items</th>
            <td mat-cell *matCellDef="let po">{{ po.items }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let po">
              <button mat-icon-button color="primary" matTooltip="View">
                <mat-icon>visibility</mat-icon>
              </button>
              <button mat-icon-button color="accent" matTooltip="Edit">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Delete">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 20]" [pageSize]="10" showFirstLastButtons></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
