<div class="products-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Products</mat-card-title>
      <div class="header-actions">
        <button mat-raised-button color="primary">
          <mat-icon>add</mat-icon>
          Add Product
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      <div class="filter-bar">
        <mat-form-field appearance="outline" class="filter-input">
          <mat-label>Filter products</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Search by name, SKU, or category">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
      </div>

      <div class="table-wrapper">
        <table mat-table [dataSource]="dataSource" matSort class="products-table">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
            <td mat-cell *matCellDef="let product">{{ product.name }}</td>
          </ng-container>

          <ng-container matColumnDef="sku">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>SKU</th>
            <td mat-cell *matCellDef="let product">
              <span class="sku-badge">{{ product.sku }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
            <td mat-cell *matCellDef="let product">
              <mat-chip-listbox>
                <mat-chip-option [value]="product.category" [class.raw-materials]="product.category === 'Raw Materials'"
                  [class.finished-goods]="product.category === 'Finished Goods'"
                  [class.packaging]="product.category === 'Packaging'" selectable="false">
                  {{ product.category }}
                </mat-chip-option>
              </mat-chip-listbox>
            </td>
          </ng-container>

          <ng-container matColumnDef="price">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Price</th>
            <td mat-cell *matCellDef="let product">{{ product.price | currency }}</td>
          </ng-container>

          <ng-container matColumnDef="stock">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Stock</th>
            <td mat-cell *matCellDef="let product">
              <span class="stock-value" [ngClass]="getStockColor(product.stock)">{{ product.stock }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
            <td mat-cell *matCellDef="let product">
              <mat-chip-listbox>
                <mat-chip-option [value]="product.status"
                  [class.active-status]="product.status === 'Active'"
                  [class.discontinued-status]="product.status === 'Discontinued'"
                  selectable="false">
                  {{ product.status }}
                </mat-chip-option>
              </mat-chip-listbox>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let product">
              <button mat-icon-button color="primary" matTooltip="Edit product">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Delete product" (click)="deleteProduct(product)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
