server:
  port: 8109

spring:
  application:
    name: ai-rag-service
  datasource:
    url: jdbc:postgresql://postgres:5432/supplychainai?currentSchema=ai_schema
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:SupplyChain@2024}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: ai_schema
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: ai-rag-service
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# LangChain4j Configuration
langchain4j:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    chat-model: ${OLLAMA_CHAT_MODEL:llama3.1}
    embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    timeout: 60s
    max-retries: 3
  rag:
    enabled: true
    retriever:
      max-results: 5
      min-score: 0.7
    content-retriever:
      max-tokens: 4000
    query-transformer:
      enabled: true

# Spring AI Configuration
spring:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      chat:
        model: ${OLLAMA_CHAT_MODEL:llama3.1}
        options:
          temperature: 0.7
          top-p: 0.9
      embedding:
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
        options:
          temperature: 0.0
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        max-document-batch-size: 100

# PGVector Configuration
pgvector:
  database: ${PGVECTOR_DATABASE:supplychainai}
  username: ${PGVECTOR_USERNAME:postgres}
  password: ${PGVECTOR_PASSWORD:SupplyChain@2024}
  host: postgres
  port: 5432
  vector-dimension: 768
  index-type: HNSW
  distance-type: COSINE_DISTANCE

# RAG Configuration
rag:
  chunk-size: 500
  chunk-overlap: 100
  max-documents-per-query: 10
  similarity-threshold: 0.7
  embedding-batch-size: 10

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://service-registry:8761/eureka/}
  instance:
    prefer-ip-address: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.supplychainai.airagrservice: DEBUG
    dev.langchain4j: DEBUG
    org.springframework.ai: DEBUG