server:
  port: 8111
spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://postgres:5432/supplychainai?currentSchema=admin_schema
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:SupplyChain@2024}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: admin_schema
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://service-registry:8761/eureka/}
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
