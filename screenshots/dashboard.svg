  <circle cx="800" cy="404" r="10" fill="#FFF3E0"/>
  <text x="795" y="409" font-size="11" fill="#F57C00">⚠️</text>
  <text x="822" y="400" font-size="12" fill="#333">Inventory low: SKU-TITAN-082</text>
  <text x="822" y="416" font-size="11" fill="#999">2 hours ago</text>
  <line x1="786" y1="431" x2="1174" y2="431" stroke="#F5F5F5" stroke-width="1"/>
  <!-- Alert 2 -->
  <rect x="786" y="435" width="388" height="48" rx="6" fill="transparent"/>
  <circle cx="800" cy="459" r="10" fill="#E3F2FD"/>
  <text x="795" y="464" font-size="11" fill="#1976D2">ℹ️</text>
  <text x="822" y="455" font-size="12" fill="#333">PO-2024-003 requires approval</text>
  <text x="822" y="471" font-size="11" fill="#999">3 hours ago</text>
  <!-- Alert 3 -->
  <rect x="786" y="490" width="388" height="48" rx="6" fill="transparent"/>
  <circle cx="800" cy="514" r="10" fill="#E8F5E9"/>
  <text x="795" y="519" font-size="11" fill="#388E3C">✅</text>
  <text x="822" y="510" font-size="12" fill="#333">Quality check #QC-045 passed</text>
  <text x="822" y="526" font-size="11" fill="#999">5 hours ago</text>
  <!-- Alert 4 -->
  <rect x="786" y="545" width="388" height="48" rx="6" fill="transparent"/>
  <circle cx="800" cy="569" r="10" fill="#E3F2FD"/>
  <text x="795" y="574" font-size="11" fill="#1976D2">🚚</text>
  <text x="822" y="565" font-size="12" fill="#333">Shipment SHP-029 departed</text>
