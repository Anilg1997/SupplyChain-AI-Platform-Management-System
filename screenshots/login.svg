<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Inter', 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="loginBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#loginBg)"/>
  <!-- Login Card -->
  <rect x="390" y="100" width="420" height="550" rx="16" fill="white" filter="drop-shadow(0 20px 60px rgba(0,0,0,0.3))"/>
  <!-- Header -->
  <circle cx="600" cy="140" r="24" fill="#E3F2FD"/>
  <text x="593" y="147" font-size="24" fill="#1976D2">📦</text>
  <text x="600" y="195" font-size="22" fill="#1a1a2e" font-weight="700" text-anchor="middle">SupplyChain Pro</text>
  <text x="600" y="220" font-size="14" fill="#666" text-anchor="middle">Sign in to your account</text>
  <!-- Form -->
  <text x="420" y="260" font-size="13" fill="#666" font-weight="500">Email</text>
  <rect x="420" y="270" width="360" height="50" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="440" y="293" font-size="13" fill="#1976D2">@</text>
  <text x="460" y="300" font-size="13" fill="#9CA3AF">you@company.com</text>
  <text x="420" y="345" font-size="13" fill="#666" font-weight="500">Password</text>
  <rect x="420" y="355" width="360" height="50" rx="8" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="440" y="378" font-size="13" fill="#1976D2">🔒</text>
  <text x="460" y="385" font-size="13" fill="#9CA3AF">••••••••••</text>
  <!-- Submit -->
  <rect x="420" y="430" width="360" height="48" rx="8" fill="#1976D2"/>
  <text x="600" y="460" font-size="15" fill="white" font-weight="600" text-anchor="middle">Sign In</text>
  <!-- Toggle -->
  <text x="600" y="500" font-size="13" fill="#666" text-anchor="middle">Don't have an account? Register</text>
  <!-- Footer -->
  <text x="600" y="620" font-size="12" fill="#666" text-anchor="middle">© 2024 SupplyChain Pro. All rights reserved.</text>
</svg>
